<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilex: Simul invicti</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header con carrusel -->
    <header class="header">
        <div class="overlay"></div>
        <div class="carousel">
            <div class="carousel-caption">
                <h1 class="carousel-title d-flex flex-column align-items-center justify-content-center">
                    Trilex
                    <small class="mt-2">Aprende, explora, comunica</small>
                </h1>
            </div>
        </div>

        <!-- Selector de idiomas -->
        <div class="language-switch">
            <!-- Inglés (disponible) -->
            <a href="html_add/ingles.html" class="lang-item" title="English/en">
                <img src="imgs/estados-unidos.png" alt="Inglés" class="lang-icon">
                <span class="lang-text">English</span>
            </a>

            <!-- Alemán (bloqueado) -->
            <div class="lang-item locked" data-lang="de">
                <img src="imgs/alemania.png" alt="Alemán" class="lang-icon">
                <span class="lang-text">Deutsch</span>
                <span class="lock-icon">🔒</span>
                <span class="development-message">In Entwicklung</span>
            </div>

            <!-- Ruso (bloqueado) -->
            <div class="lang-item locked" data-lang="ru">
                <img src="imgs/rusia.png" alt="Ruso" class="lang-icon">
                <span class="lang-text">Русский</span>
                <span class="lock-icon">🔒</span>
                <span class="development-message">В разработке</span>
            </div>

            <!-- Italiano (bloqueado) -->
            <div class="lang-item locked" data-lang="it">
                <img src="imgs/italia.png" alt="Italiano" class="lang-icon">
                <span class="lang-text">Italiano</span>
                <span class="lock-icon">🔒</span>
                <span class="development-message">In sviluppo</span>
            </div>

            <!-- Castellano (bloqueado) -->
            <div class="lang-item locked" data-lang="es">
                <img src="imgs/argentina.png" alt="Castellano" class="lang-icon">
                <span class="lang-text">Castellano</span>
                <span class="lock-icon">🔒</span>
                <span class="development-message">En desarrollo</span>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="infos container mb-4 mb-md-2 socials-fixed">
            <div class="socials text-right">
                <div class="row justify-content-between">
                    <div class="col">
                        <h6 class="subtitle font-weight-normal mb-2">Social Media</h6>
                        <div class="social-links">
                            <a href="https://www.instagram.com/fran_insu" target="_blank" class="link pr-1">
                                <i class="ti-instagram"></i>
                                fran_insu
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Pie de página con derechos de autor -->
    <footer class="footer">
        <p>&copy; 2025 Trilex. Todos los derechos reservados |
            <a href="html_add/terminos.html">Términos de uso</a>
        </p>
    </footer>

    <!-- Atribución de iconos de banderas -->
    <div class="attribution">
        Iconos de banderas: <a href="https://www.flaticon.es/iconos-gratis/italia" title="italia iconos"
            target="_blank">Freepik - Flaticon</a>
    </div>

    <script src="script.js"></script>
</body>

</html>
